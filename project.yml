name: NoSpend
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  NoSpend:
    type: application
    platform: iOS
    sources:
      - path: NoSpend
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nospend
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: NoSpend/Info.plist
        CODE_SIGN_ENTITLEMENTS: NoSpend/NoSpend.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NoSpendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NoSpendTests
      - path: NoSpend.storekit
    dependencies:
      - target: NoSpend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nospend.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  NoSpend:
    build:
      targets:
        NoSpend: all
        NoSpendTests: [test]
    run:
      config: Debug
      storeKitConfiguration: NoSpend.storekit
    test:
      config: Debug
      storeKitConfiguration: NoSpend.storekit
      targets:
        - NoSpendTests
    archive:
      config: Release
